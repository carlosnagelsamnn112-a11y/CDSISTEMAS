<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda de Ropa — CD Sistemas</title>
  <link rel="icon" href="../assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    :root { --shop-accent: #E8B4B8; --shop-dark: #1a1a1a; }
    body { background: #fafafa; color: #111; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .shop-nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid #eee; padding: 0 24px; }
    .shop-nav-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .shop-brand { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
    .shop-brand span { color: var(--shop-accent); }
    .shop-links { display: flex; gap: 28px; font-size: 13px; font-weight: 500; }
    .shop-links a { color: #666; transition: color 0.2s; }
    .shop-links a:hover { color: #111; }
    .shop-cart-btn { position: relative; background: none; border: none; cursor: pointer; padding: 8px; }
    .shop-cart-btn svg { width: 22px; height: 22px; color: #111; }
    .shop-cart-badge { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; background: #111; color: #fff; font-size: 10px; font-weight: 700; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .hamburger-shop { display: none; background: none; border: none; cursor: pointer; padding: 8px; }
    .hamburger-shop svg { width: 24px; height: 24px; }

    /* Hero */
    .shop-hero { max-width: 1100px; margin: 0 auto; padding: 60px 24px; text-align: center; }
    .shop-hero h1 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(32px, 5vw, 48px); font-weight: 700; line-height: 1.1; margin-bottom: 16px; }
    .shop-hero h1 em { font-style: italic; color: var(--shop-accent); }
    .shop-hero p { font-size: 16px; color: #666; max-width: 50ch; margin: 0 auto 28px; }
    .shop-hero .cd-btn { background: #111; color: #fff; border: none; padding: 14px 32px; border-radius: 50px; font-size: 14px; font-weight: 600; }
    .shop-hero .cd-btn:hover { background: #333; transform: translateY(-2px); }

    /* Filters */
    .shop-filters { max-width: 1100px; margin: 0 auto; padding: 0 24px 32px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .shop-chip { padding: 8px 20px; border-radius: 50px; border: 1px solid #ddd; background: #fff; font-size: 13px; font-weight: 500; color: #666; cursor: pointer; transition: all 0.2s; }
    .shop-chip:hover { border-color: #111; color: #111; }
    .shop-chip.active { background: #111; color: #fff; border-color: #111; }

    /* Product Grid */
    .shop-grid { max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .product-card { background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #eee; transition: all 0.3s; cursor: pointer; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
    .product-img { height: 240px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .product-img svg { width: 80px; height: 80px; color: #ccc; }
    .product-tag { position: absolute; top: 12px; left: 12px; background: #111; color: #fff; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.05em; }
    .product-info { padding: 16px; }
    .product-info h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .product-info .product-cat { font-size: 12px; color: #999; margin-bottom: 8px; }
    .product-info .product-price { font-size: 18px; font-weight: 800; }
    .product-info .product-price small { font-size: 12px; font-weight: 400; color: #999; }
    .product-sizes { display: flex; gap: 6px; margin-top: 10px; }
    .size-btn { width: 32px; height: 32px; border-radius: 6px; border: 1px solid #ddd; background: #fff; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .size-btn:hover { border-color: #111; }
    .size-btn.selected { background: #111; color: #fff; border-color: #111; }

    /* Cart Drawer */
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; opacity: 0; visibility: hidden; transition: all 0.3s; }
    .cart-overlay.open { opacity: 1; visibility: visible; }
    .cart-drawer { position: fixed; top: 0; right: 0; width: 380px; max-width: 90vw; height: 100vh; background: #fff; z-index: 201; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); display: flex; flex-direction: column; }
    .cart-overlay.open .cart-drawer { transform: translateX(0); }
    .cart-header { padding: 20px 24px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .cart-header h2 { font-size: 18px; font-weight: 700; }
    .cart-close { background: none; border: none; cursor: pointer; padding: 4px; }
    .cart-close svg { width: 20px; height: 20px; }
    .cart-items { flex: 1; overflow-y: auto; padding: 16px 24px; }
    .cart-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .cart-item-img { width: 60px; height: 60px; background: #f5f5f5; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .cart-item-img svg { width: 28px; height: 28px; color: #ccc; }
    .cart-item-info { flex: 1; }
    .cart-item-info h4 { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .cart-item-info p { font-size: 12px; color: #999; }
    .cart-item-price { font-size: 14px; font-weight: 700; margin-top: 4px; }
    .cart-item-remove { background: none; border: none; color: #999; cursor: pointer; font-size: 12px; padding: 4px; }
    .cart-item-remove:hover { color: #EA4335; }
    .cart-item-qty { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .cart-item-qty button { width: 24px; height: 24px; border-radius: 4px; border: 1px solid #ddd; background: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .cart-item-qty span { font-size: 13px; font-weight: 600; min-width: 20px; text-align: center; }
    .cart-empty { text-align: center; padding: 40px 20px; color: #999; }
    .cart-footer { padding: 20px 24px; border-top: 1px solid #eee; }
    .cart-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .cart-checkout { width: 100%; padding: 14px; background: #25D366; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .cart-checkout:hover { background: #1ebe5a; }
    .cart-whatsapp { width: 100%; padding: 12px; background: none; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; font-weight: 500; color: #666; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
    .cart-whatsapp:hover { border-color: #111; color: #111; }

    /* Size selector modal */
    .size-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.3s; }
    .size-modal-overlay.open { opacity: 1; visibility: visible; }
    .size-modal { background: #fff; border-radius: 16px; padding: 28px; max-width: 320px; width: 90%; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); }
    .size-modal-overlay.open .size-modal { transform: scale(1); }
    .size-modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .size-modal p { font-size: 13px; color: #999; margin-bottom: 16px; }
    .size-modal-sizes { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .size-modal-actions { display: flex; gap: 10px; }

    @media (max-width: 1024px) { .shop-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) {
      .shop-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .shop-links { display: none; }
      .hamburger-shop { display: block; }
      .product-img { height: 180px; }
    }
    @media (max-width: 480px) {
      .shop-grid { grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px 60px; }
      .product-info { padding: 12px; }
      .product-info h3 { font-size: 13px; }
      .product-price { font-size: 15px !important; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="shop-nav">
  <div class="shop-nav-inner">
    <div class="shop-brand">urban<span>fit</span></div>
    <div class="shop-links">
      <a href="#catalogo">Catálogo</a>
      <a href="#nosotros">Nosotros</a>
      <a href="#contacto">Contacto</a>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="shop-cart-btn" id="openCart" aria-label="Abrir carrito">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="shop-cart-badge" id="cartBadge" aria-live="polite">0</span>
      </button>
      <button class="hamburger-shop" id="hamburgerShop" aria-label="Menú">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="shop-hero">
  <h1>Encuentra tu <em>estilo</em></h1>
  <p>Ropa urbana y deportiva diseñada para quienes buscan comodidad sin sacrificar estilo. Envíos a toda Colombia.</p>
  <a href="#catalogo" class="cd-btn">Ver Colección</a>
</section>

<!-- FILTERS -->
<div class="shop-filters" id="catalogo">
  <button class="shop-chip active" data-cat="TODOS">Todos</button>
  <button class="shop-chip" data-cat="camisas">Camisas</button>
  <button class="shop-chip" data-cat="pantalones">Pantalones</button>
  <button class="shop-chip" data-cat="zapatos">Zapatos</button>
  <button class="shop-chip" data-cat="accesorios">Accesorios</button>
</div>

<!-- PRODUCT GRID -->
<div class="shop-grid" id="productGrid"></div>

<!-- CART OVERLAY -->
<div class="cart-overlay" id="cartOverlay">
  <div class="cart-drawer" role="dialog" aria-label="Carrito de compras">
    <div class="cart-header">
      <h2>Mi Carrito</h2>
      <button class="cart-close" id="closeCart" aria-label="Cerrar carrito">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer" id="cartFooter" style="display:none;">
      <div class="cart-total">
        <span>Total</span>
        <span id="cartTotal">$0</span>
      </div>
      <button class="cart-checkout" onclick="checkoutWhatsApp()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:6px;"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.532 5.861L.057 23.479a.5.5 0 0 0 .613.635l5.799-1.524A11.95 11.95 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>
        Comprar por WhatsApp
      </button>
      <button class="cart-whatsapp" onclick="clearCart()">Vaciar carrito</button>
    </div>
  </div>
</div>

<!-- SIZE SELECTOR MODAL -->
<div class="size-modal-overlay" id="sizeModal">
  <div class="size-modal">
    <h3 id="sizeProductName"></h3>
    <p>Selecciona tu talla</p>
    <div class="size-modal-sizes" id="sizeOptions"></div>
    <div class="size-modal-actions">
      <button class="cd-btn cd-btn-ghost" onclick="closeSizeModal()">Cancelar</button>
      <button class="cd-btn" style="background:#111;color:#fff;" onclick="confirmAddToCart()">Agregar</button>
    </div>
  </div>
</div>

<script>
  // ===== DATA =====
  const formatCOP = n => '$' + n.toLocaleString('es-CO');
  const products = [
    { id: 1, name: 'Camisa Oxford Classic', cat: 'camisas', price: 89000, sizes: ['S','M','L','XL'], color: '#E8B4B8' },
    { id: 2, name: 'Camiseta Básica Premium', cat: 'camisas', price: 45000, sizes: ['XS','S','M','L','XL'], color: '#B8D4E3' },
    { id: 3, name: 'Pantalón Cargo Urban', cat: 'pantalones', price: 120000, sizes: ['28','30','32','34','36'], color: '#C5E8B4' },
    { id: 4, name: 'Jeans Slim Fit', cat: 'pantalones', price: 135000, sizes: ['28','30','32','34'], color: '#B4C5E8' },
    { id: 5, name: 'Tenis Running Pro', cat: 'zapatos', price: 189000, sizes: ['38','39','40','41','42','43'], color: '#E8D4B4' },
    { id: 6, name: 'Sneakers Urban Style', cat: 'zapatos', price: 159000, sizes: ['38','39','40','41','42'], color: '#D4B4E8' },
    { id: 7, name: 'Gorra Trucker Logo', cat: 'accesorios', price: 35000, sizes: ['Única'], color: '#E8E8B4' },
    { id: 8, name: 'Mochila Urban Pack', cat: 'accesorios', price: 95000, sizes: ['Única'], color: '#B4E8D4' },
    { id: 9, name: 'Camisa Linen Summer', cat: 'camisas', price: 110000, sizes: ['S','M','L','XL'], color: '#E8C4B4' },
    { id: 10, name: 'Pantalón Chino Slim', cat: 'pantalones', price: 99000, sizes: ['28','30','32','34'], color: '#C4E8B4' },
    { id: 11, name: 'Bota Trekker Pro', cat: 'zapatos', price: 220000, sizes: ['39','40','41','42','43','44'], color: '#B4D4E8' },
    { id: 12, name: 'Cinturón cuero artesanal', cat: 'accesorios', price: 65000, sizes: ['S','M','L'], color: '#E8B4D4' }
  ];

  let cart = JSON.parse(localStorage.getItem('shop_cart') || '[]');
  let currentFilter = 'TODOS';
  let pendingProduct = null;
  let pendingSize = null;

  // ===== RENDER PRODUCTS =====
  function renderProducts() {
    const grid = document.getElementById('productGrid');
    const filtered = currentFilter === 'TODOS' ? products : products.filter(p => p.cat === currentFilter);
    grid.innerHTML = filtered.map(p => `
      <div class="product-card" onclick="openSizeModal(${p.id})">
        <div class="product-img" style="background:${p.color}20;">
          <svg viewBox="0 0 24 24" fill="none" stroke="${p.color}" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          <span class="product-tag">${p.cat.toUpperCase()}</span>
        </div>
        <div class="product-info">
          <h3>${p.name}</h3>
          <p class="product-cat">${p.sizes.join(' / ')}</p>
          <div class="product-price">${formatCOP(p.price)} <small>COP</small></div>
        </div>
      </div>
    `).join('');
  }

  // ===== FILTERS =====
  document.querySelectorAll('.shop-chip[data-cat]').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.shop-chip[data-cat]').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentFilter = chip.dataset.cat;
      renderProducts();
    });
  });

  // ===== SIZE MODAL =====
  function openSizeModal(productId) {
    pendingProduct = products.find(p => p.id === productId);
    pendingSize = null;
    document.getElementById('sizeProductName').textContent = pendingProduct.name;
    document.getElementById('sizeOptions').innerHTML = pendingProduct.sizes.map(s =>
      `<button class="size-btn" data-size="${s}" onclick="selectSize(this, '${s}')">${s}</button>`
    ).join('');
    document.getElementById('sizeModal').classList.add('open');
  }

  function selectSize(btn, size) {
    document.querySelectorAll('#sizeOptions .size-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    pendingSize = size;
  }

  function closeSizeModal() {
    document.getElementById('sizeModal').classList.remove('open');
    pendingProduct = null;
    pendingSize = null;
  }

  function confirmAddToCart() {
    if (!pendingSize) { alert('Selecciona una talla'); return; }
    const existing = cart.find(i => i.productId === pendingProduct.id && i.size === pendingSize);
    if (existing) {
      existing.qty++;
    } else {
      cart.push({ productId: pendingProduct.id, name: pendingProduct.name, price: pendingProduct.price, size: pendingSize, cat: pendingProduct.cat, color: pendingProduct.color, qty: 1 });
    }
    localStorage.setItem('shop_cart', JSON.stringify(cart));
    updateCartUI();
    closeSizeModal();
  }

  // ===== CART =====
  function updateCartUI() {
    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
    const count = cart.reduce((s, i) => s + i.qty, 0);
    document.getElementById('cartBadge').textContent = count;

    if (cart.length === 0) {
      document.getElementById('cartItems').innerHTML = '<div class="cart-empty"><p>Tu carrito está vacío</p></div>';
      document.getElementById('cartFooter').style.display = 'none';
      return;
    }

    document.getElementById('cartFooter').style.display = '';
    document.getElementById('cartTotal').textContent = formatCOP(total);
    document.getElementById('cartItems').innerHTML = cart.map((item, idx) => `
      <div class="cart-item">
        <div class="cart-item-img" style="background:${item.color}20;">
          <svg viewBox="0 0 24 24" fill="none" stroke="${item.color}" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        </div>
        <div class="cart-item-info">
          <h4>${item.name}</h4>
          <p>Talla: ${item.size}</p>
          <div class="cart-item-qty">
            <button onclick="changeQty(${idx}, -1)" aria-label="Reducir cantidad">−</button>
            <span>${item.qty}</span>
            <button onclick="changeQty(${idx}, 1)" aria-label="Aumentar cantidad">+</button>
          </div>
          <div class="cart-item-price">${formatCOP(item.price * item.qty)}</div>
        </div>
        <button class="cart-item-remove" onclick="removeItem(${idx})" aria-label="Eliminar ${item.name}">✕</button>
      </div>
    `).join('');
  }

  function changeQty(idx, delta) {
    cart[idx].qty += delta;
    if (cart[idx].qty <= 0) cart.splice(idx, 1);
    localStorage.setItem('shop_cart', JSON.stringify(cart));
    updateCartUI();
  }

  function removeItem(idx) {
    cart.splice(idx, 1);
    localStorage.setItem('shop_cart', JSON.stringify(cart));
    updateCartUI();
  }

  function clearCart() {
    cart = [];
    localStorage.setItem('shop_cart', JSON.stringify(cart));
    updateCartUI();
  }

  function checkoutWhatsApp() {
    let msg = 'Hola! Quiero realizar el siguiente pedido:\n\n';
    cart.forEach(item => {
      msg += `• ${item.name} (Talla: ${item.size}) x${item.qty} — ${formatCOP(item.price * item.qty)}\n`;
    });
    msg += `\nTotal: ${formatCOP(cart.reduce((s, i) => s + i.price * i.qty, 0))}`;
    window.open('https://wa.me/573104848585?text=' + encodeURIComponent(msg), '_blank');
  }

  // ===== CART DRAWER =====
  document.getElementById('openCart').addEventListener('click', () => document.getElementById('cartOverlay').classList.add('open'));
  document.getElementById('closeCart').addEventListener('click', () => document.getElementById('cartOverlay').classList.remove('open'));
  document.getElementById('cartOverlay').addEventListener('click', (e) => { if (e.target.id === 'cartOverlay') e.target.classList.remove('open'); });

  // ===== INIT =====
  renderProducts();
  updateCartUI();
</script>
</body>
</html>
